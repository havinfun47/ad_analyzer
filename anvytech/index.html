<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Anvy Tech — Performance Dashboard | Scale Science</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0A; --surface: #111; --card: #141414; --border: #222;
      --text: #F0EDE8; --muted: #666; --dim: #333; --accent: #00FF6A;
      --red: #FF5555;
      --font-head: 'Space Grotesk', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding: 32px 24px 64px;
    }
    .container { max-width: 1040px; margin: 0 auto; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
    .logo-svg { height: 30px; }
    .powered {
      font-family: var(--font-head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    }

    .hero { margin-bottom: 40px; }
    .eyebrow {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent);
      margin-bottom: 14px;
    }
    h1 {
      font-family: var(--font-head); font-weight: 800; letter-spacing: -0.02em;
      font-size: clamp(28px, 4.5vw, 44px); line-height: 1.1; margin-bottom: 24px;
    }

    .period-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .period-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      cursor: pointer;
      min-width: 160px;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23F0EDE8' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 32px;
    }
    .period-select:focus { outline: none; border-color: var(--accent); }
    .period-label { font-size: 13px; color: var(--muted); }

    .loading, .error {
      padding: 80px 24px; text-align: center; color: var(--muted);
      font-size: 14px;
    }
    .error { color: var(--red); }

    /* Primary grid: Revenue + ROAS (most prominent) */
    .primary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    @media (max-width: 700px) { .primary-grid { grid-template-columns: 1fr; } }

    .primary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }
    .primary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .primary-label {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 18px;
    }
    .primary-value {
      font-family: var(--font-head);
      font-size: clamp(40px, 6vw, 56px);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 16px;
    }

    /* Secondary grid: Ad Spend */
    .secondary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 30px;
    }
    @media (max-width: 700px) { .secondary-grid { grid-template-columns: 1fr; } }

    .secondary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 24px;
    }
    .secondary-label {
      font-family: var(--font-head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }
    .secondary-value {
      font-family: var(--font-head); font-size: 26px; font-weight: 700;
      letter-spacing: -0.015em; color: var(--text); line-height: 1;
      margin-bottom: 10px;
    }

    /* % change badge */
    .change {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font-head); font-size: 12px; font-weight: 600;
      padding: 4px 9px; border-radius: 6px;
    }
    .change.up      { background: rgba(0,255,106,0.13);  color: var(--accent); }
    .change.down    { background: rgba(255,85,85,0.14);  color: var(--red); }
    .change.neutral { background: rgba(255,255,255,0.06); color: var(--muted); }
    .change-caret { font-size: 11px; line-height: 1; }
    .change-vs {
      margin-left: 8px; font-size: 11px; color: var(--dim);
      font-family: var(--font-head); letter-spacing: 0.05em;
    }

    /* Bonus card (now smaller, secondary in visual weight) */
    .bonus-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .bonus-info { min-width: 0; }
    .bonus-label {
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 6px;
    }
    .bonus-label .bonus-month {
      color: var(--accent); letter-spacing: 0.06em;
    }
    .bonus-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .bonus-value {
      font-family: var(--font-head); font-size: 28px; font-weight: 700;
      letter-spacing: -0.015em; color: var(--text);
    }

    footer {
      margin-top: 56px; text-align: center; font-size: 11px; color: var(--dim);
      font-family: var(--font-head); letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <svg class="logo-svg" viewBox="0 0 200 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="28" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="800" fill="#F0EDE8">Scale</text>
      <rect x="102" y="0" width="76" height="36" rx="3" fill="#F0EDE8"/>
      <text x="109" y="25" font-family="'Space Grotesk', sans-serif" font-size="21" font-weight="800" fill="#0A0A0A">Sci</text>
    </svg>
    <div class="powered">Client Performance Dashboard</div>
  </header>

  <div class="hero">
    <div class="eyebrow">Anvy Tech</div>
    <h1>Performance Snapshot</h1>
    <div class="period-row">
      <select class="period-select" id="period-select">
        <option value="this_month" selected>Month to date</option>
        <option value="last_7d">Last 7 days</option>
        <option value="last_14d">Last 14 days</option>
        <option value="last_30d">Last 30 days</option>
        <option value="last_90d">Last 90 days</option>
        <option value="last_month">Last month</option>
      </select>
      <span class="period-label" id="period-label"></span>
    </div>
  </div>

  <div id="loading" class="loading">Loading live performance data…</div>
  <div id="error" class="error" style="display:none"></div>

  <div id="content" style="display:none">
    <div class="primary-grid">
      <div class="primary-card">
        <div class="primary-label">Revenue</div>
        <div class="primary-value" id="revenue">—</div>
        <div>
          <span id="revenue-change"></span>
          <span class="change-vs" id="revenue-vs"></span>
        </div>
      </div>
      <div class="primary-card">
        <div class="primary-label">ROAS</div>
        <div class="primary-value" id="roas">—</div>
        <div>
          <span id="roas-change"></span>
          <span class="change-vs" id="roas-vs"></span>
        </div>
      </div>
    </div>

    <div class="secondary-grid">
      <div class="secondary-card">
        <div class="secondary-label">Ad Spend</div>
        <div class="secondary-value" id="spend">—</div>
        <div>
          <span id="spend-change"></span>
          <span class="change-vs" id="spend-vs"></span>
        </div>
      </div>
    </div>

    <div class="bonus-card">
      <div class="bonus-info">
        <div class="bonus-label">Performance Bonus — Month to Date <span class="bonus-month" id="bonus-month"></span></div>
        <div class="bonus-sub">Locked to current month · 10% of gross profit above breakeven ROAS 2.1</div>
      </div>
      <div class="bonus-value" id="bonus">—</div>
    </div>
  </div>

  <footer>Scale Science &nbsp;·&nbsp; Internal Use</footer>
</div>

<script>
(() => {
  const TOKEN          = "EAAhmSeA3mdMBRUAtVzXD1imThZBTK2WfTZAPtajNpjRxs8RdLV2VPVZARH6Nr7XWjAJCr6eDHKZA3oWB3pZCw15UtxUsZCEyPVrqmdTdBUZBp7Bf3sZBQi18zZAmUXb6BgkcYrXkug9MC5ZCLVN405n5hkNN0ed9TMCCeVxklAG7bvELAZAtlBZAMis7KuyZCnbWvyg49uwZDZD";
  const AD_ACCOUNT_ID  = "act_575199276244807";
  const API_BASE       = "https://graph.facebook.com/v25.0";
  const PURCHASE_ACTION = "offsite_conversion.fb_pixel_purchase";
  const BREAKEVEN_ROAS = 2.1;
  const BONUS_RATE     = 0.10;

  let currency = "CAD";

  /* ── date helpers ───────────────────────────────────────── */
  const pad  = n => String(n).padStart(2, "0");
  const ymd  = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const monthName = d => d.toLocaleDateString("en-CA", { month: "long",  year: "numeric" });
  const fmtDate   = d => d.toLocaleDateString("en-CA", { month: "short", day: "numeric", year: "numeric" });

  function periodToDates(period) {
    const today = new Date();
    if (period === "this_month") {
      return { since: ymd(new Date(today.getFullYear(), today.getMonth(), 1)), until: ymd(today) };
    }
    if (period === "last_month") {
      const start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      const end   = new Date(today.getFullYear(), today.getMonth(),     0); // last day of prev month
      return { since: ymd(start), until: ymd(end) };
    }
    const days  = { last_7d: 7, last_14d: 14, last_30d: 30, last_90d: 90 }[period] || 30;
    const since = new Date(today); since.setDate(today.getDate() - (days - 1));
    return { since: ymd(since), until: ymd(today) };
  }

  function comparisonDates(period) {
    const today = new Date();
    if (period === "this_month") {
      // Previous month, same number of days into it as today
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const daysInto   = Math.round((today - monthStart) / 86400000) + 1;
      const prevStart  = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      const prevEnd    = new Date(today.getFullYear(), today.getMonth() - 1, daysInto);
      return { since: ymd(prevStart), until: ymd(prevEnd) };
    }
    if (period === "last_month") {
      // Month before last month
      const start = new Date(today.getFullYear(), today.getMonth() - 2, 1);
      const end   = new Date(today.getFullYear(), today.getMonth() - 1, 0);
      return { since: ymd(start), until: ymd(end) };
    }
    const days  = { last_7d: 7, last_14d: 14, last_30d: 30, last_90d: 90 }[period] || 30;
    const untilDate = new Date(today); untilDate.setDate(today.getDate() - days);
    const sinceDate = new Date(untilDate); sinceDate.setDate(untilDate.getDate() - (days - 1));
    return { since: ymd(sinceDate), until: ymd(untilDate) };
  }

  function monthToDateRange() {
    const today = new Date();
    return { since: ymd(new Date(today.getFullYear(), today.getMonth(), 1)), until: ymd(today) };
  }

  function periodVsLabel(period) {
    switch (period) {
      case "this_month": return "vs same days last month";
      case "last_month": return "vs month before";
      case "last_7d":    return "vs prior 7 days";
      case "last_14d":   return "vs prior 14 days";
      case "last_30d":   return "vs prior 30 days";
      case "last_90d":   return "vs prior 90 days";
      default:           return "vs prior period";
    }
  }

  /* ── API + extractors ───────────────────────────────────── */
  async function api(path, params) {
    const url = new URL(`${API_BASE}/${path}`);
    url.searchParams.set("access_token", TOKEN);
    for (const [k, v] of Object.entries(params || {})) {
      url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : v);
    }
    const res = await fetch(url.toString());
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "Meta API error");
    return data;
  }

  function getActionValue(row, type) {
    const arr = row?.action_values || [];
    const a = arr.find(x => x.action_type === type);
    return a ? parseFloat(a.value || 0) : 0;
  }

  function metricsFromRow(row) {
    const spend   = parseFloat(row?.spend || 0);
    const revenue = getActionValue(row, PURCHASE_ACTION);
    const roas    = spend > 0 ? revenue / spend : 0;
    return { spend, revenue, roas };
  }

  async function fetchInsights({ since, until }) {
    const data = await api(`${AD_ACCOUNT_ID}/insights`, {
      level: "account",
      time_range: { since, until },
      fields: "spend,action_values"
    });
    return (data.data && data.data[0]) || {};
  }

  /* ── formatters ─────────────────────────────────────────── */
  function formatCurrency(val) {
    return new Intl.NumberFormat("en-CA", {
      style: "currency", currency,
      minimumFractionDigits: val >= 1000 ? 0 : 2, maximumFractionDigits: 2
    }).format(val || 0);
  }
  function formatRoas(val) { return `${(val || 0).toFixed(2)}×`; }

  function pctChange(curr, prev) {
    if (prev == null || prev === 0) return null;
    return ((curr - prev) / Math.abs(prev)) * 100;
  }

  function renderChange(elId, curr, prev, opts = {}) {
    const el = document.getElementById(elId);
    if (!el) return;
    const pct = pctChange(curr, prev);
    if (pct == null) {
      el.outerHTML = `<span id="${elId}" class="change neutral">—</span>`;
      return;
    }
    const isPos    = pct >= 0;
    const goodIsUp = opts.goodIsUp !== false; // default: up is good
    const useColor = opts.color !== false;
    let cls = "neutral";
    if (useColor) {
      cls = (isPos === goodIsUp) ? "up" : "down";
    }
    const arrow  = isPos ? "↑" : "↓";
    const sign   = isPos ? "+" : "";
    el.outerHTML = `<span id="${elId}" class="change ${cls}">
      <span class="change-caret">${arrow}</span>${sign}${pct.toFixed(1)}%
    </span>`;
  }

  function showError(msg) {
    document.getElementById("loading").style.display = "none";
    const e = document.getElementById("error");
    e.textContent = msg;
    e.style.display = "block";
  }

  /* ── orchestration ──────────────────────────────────────── */
  async function load(period) {
    document.getElementById("loading").style.display = "block";
    document.getElementById("error").style.display   = "none";
    document.getElementById("content").style.display = "none";

    try {
      const cur  = periodToDates(period);
      const prev = comparisonDates(period);
      const mtd  = monthToDateRange();

      // Set period label immediately
      const sinceFmt = fmtDate(new Date(cur.since + "T00:00:00"));
      const untilFmt = fmtDate(new Date(cur.until + "T00:00:00"));
      document.getElementById("period-label").textContent = `${sinceFmt} – ${untilFmt}`;
      document.getElementById("bonus-month").textContent = `(${monthName(new Date())})`;

      // If selected period equals month-to-date, reuse current data for bonus (save a call)
      const sameAsMTD = (cur.since === mtd.since && cur.until === mtd.until);

      const calls = [
        api(AD_ACCOUNT_ID, { fields: "currency" }),
        fetchInsights(cur),
        fetchInsights(prev),
      ];
      if (!sameAsMTD) calls.push(fetchInsights(mtd));

      const [acctInfo, curRow, prevRow, mtdRow] = await Promise.all(calls);
      currency = acctInfo.currency || "CAD";

      const c = metricsFromRow(curRow);
      const p = metricsFromRow(prevRow);
      const m = sameAsMTD ? c : metricsFromRow(mtdRow);

      // Primary cards
      document.getElementById("revenue").textContent = formatCurrency(c.revenue);
      document.getElementById("spend").textContent   = formatCurrency(c.spend);
      document.getElementById("roas").textContent    = formatRoas(c.roas);

      // % change badges
      renderChange("revenue-change", c.revenue, p.revenue);
      renderChange("roas-change",    c.roas,    p.roas);
      renderChange("spend-change",   c.spend,   p.spend, { color: false }); // spend change shown without good/bad colour

      const vsLabel = periodVsLabel(period);
      document.getElementById("revenue-vs").textContent = vsLabel;
      document.getElementById("roas-vs").textContent    = vsLabel;
      document.getElementById("spend-vs").textContent   = vsLabel;

      // Bonus (always MTD)
      const breakevenRev = m.spend * BREAKEVEN_ROAS;
      const grossProfit  = m.revenue - breakevenRev;
      const bonus        = Math.max(0, grossProfit) * BONUS_RATE;
      document.getElementById("bonus").textContent = formatCurrency(bonus);

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    } catch (e) {
      showError(`Unable to load data: ${e.message}`);
    }
  }

  document.getElementById("period-select").addEventListener("change", e => load(e.target.value));
  load(document.getElementById("period-select").value);
})();
</script>
</body>
</html>
